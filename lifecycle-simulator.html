<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>📡 통신 서비스 라이프사이클 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
  input,select,textarea,button{font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:2px solid #3b82f6;outline-offset:1px;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#1e293b;}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
  input,select{background:#0f172a;color:#e2e8f0;border:1.5px solid #334155;border-radius:7px;padding:8px 11px;font-size:13px;width:100%;}
  select option{background:#1e293b;}
  .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px;}
  .tag-blue{background:#1e3a5f;color:#60a5fa;}
  .tag-purple{background:#2d1b69;color:#a78bfa;}
  .tag-green{background:#14532d;color:#4ade80;}
  .tag-orange{background:#431407;color:#fb923c;}
  .tag-teal{background:#134e4a;color:#2dd4bf;}
  .tag-gray{background:#1e293b;color:#94a3b8;}
  .tag-red{background:#450a0a;color:#f87171;}
  .tag-yellow{background:#422006;color:#fbbf24;}
  .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:#2563eb;color:#fff;}
  .btn-primary:hover:not(:disabled){background:#1d4ed8;}
  .btn-success{background:#16a34a;color:#fff;}
  .btn-success:hover:not(:disabled){background:#15803d;}
  .btn-warning{background:#d97706;color:#fff;}
  .btn-warning:hover:not(:disabled){background:#b45309;}
  .btn-danger{background:#dc2626;color:#fff;}
  .btn-danger:hover:not(:disabled){background:#b91c1c;}
  .btn-ghost{background:#1e293b;color:#cbd5e1;border:1px solid #334155;}
  .btn-ghost:hover:not(:disabled){background:#263348;border-color:#60a5fa;}
  .btn-teal{background:#0d9488;color:#fff;}
  .btn-teal:hover:not(:disabled){background:#0f766e;}
  .card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;}
  .card-sm{background:#1e293b;border:1px solid #334155;border-radius:9px;padding:12px;}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#64748b;margin-bottom:10px;}
  .divider{border:none;border-top:1px solid #1e293b;margin:12px 0;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .animate-fade{animation:fadeIn .3s ease;}
  .animate-spin{animation:spin 1s linear infinite;}
  .animate-pulse{animation:pulse 1.5s ease-in-out infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ══════════════════════════════════════════════
// 데이터 정의
// ══════════════════════════════════════════════
const PLANS = [
  { id:'lte_lite',    name:'LTE 라이트',     price:19900, type:'LTE', data:'5GB',    speed:'75Mbps',  voice:'200분', sms:'기본' },
  { id:'5g_basic',    name:'5G 베이직',      price:34900, type:'5G',  data:'30GB',   speed:'1Gbps',   voice:'무제한', sms:'무제한' },
  { id:'5g_standard', name:'5G 스탠다드',    price:49900, type:'5G',  data:'100GB',  speed:'1Gbps',   voice:'무제한', sms:'무제한' },
  { id:'5g_premium',  name:'5G 프리미엄',    price:69900, type:'5G',  data:'완전무제한',speed:'20Gbps', voice:'무제한', sms:'무제한' },
];
const ADDONS = [
  { id:'intl_call',  name:'국제전화 패키지',  price:9900,  icon:'📞', desc:'월 100분 국제통화' },
  { id:'data_1gb',   name:'데이터 1GB 추가', price:3300,  icon:'📦', desc:'일회성 1GB 충전' },
  { id:'roaming',    name:'아시아 로밍',      price:8900,  icon:'✈️', desc:'아시아 15개국' },
  { id:'youtube',    name:'유튜브 프리미엄',  price:14000, icon:'▶️', desc:'광고 없는 유튜브' },
  { id:'voicemail',  name:'음성사서함',       price:1100,  icon:'📬', desc:'부재중 메시지 저장' },
];
const CONTRACT_OPTIONS = [
  { id:'monthly', name:'월정', penalty:0 },
  { id:'c12',     name:'12개월 약정', penalty:3 },
  { id:'c24',     name:'24개월 약정', penalty:6 },
];

// TM Forum 레퍼런스
const TMF_APIS = {
  TMF620:'Product Catalog Management',
  TMF622:'Product Ordering Management',
  TMF632:'Party Management',
  TMF637:'Product Inventory Management',
  TMF638:'Service Inventory Management',
  TMF639:'Resource Inventory Management',
  TMF641:'Service Ordering Management',
  TMF666:'Account Management',
  TMF678:'Payment Management',
};
const ETOM_PROCESSES = {
  order_handling:     { code:'OP.2.2', name:'Order Handling', domain:'CRM' },
  identity_mgmt:      { code:'OP.2.1', name:'Customer Interface Mgmt', domain:'CRM' },
  service_config:     { code:'OP.3.4', name:'SM&O — Service Configuration & Activation', domain:'SM&O' },
  resource_provision: { code:'OP.4.2', name:'RM&O — Resource Provisioning', domain:'RM&O' },
  problem_handling:   { code:'OP.2.3', name:'Problem Handling', domain:'CRM' },
  billing:            { code:'OP.2.5', name:'Billing & Collections Mgmt', domain:'CRM' },
  qos_mgmt:           { code:'OP.2.4', name:'Customer QoS/SLA Mgmt', domain:'CRM' },
};
const SID_ENTITIES = {
  Party:         { domain:'Party ABE',   desc:'고객 신원 및 연락처 정보' },
  Customer:      { domain:'Party ABE',   desc:'서비스 구독 고객 역할' },
  ProductOrder:  { domain:'Product ABE', desc:'상품 주문 요청 엔티티' },
  Product:       { domain:'Product ABE', desc:'구독 중인 상품 인스턴스' },
  Service:       { domain:'Service ABE', desc:'음성·데이터 서비스 인스턴스' },
  Resource:      { domain:'Resource ABE',desc:'MSISDN, SIM, 네트워크 포트' },
  Agreement:     { domain:'Party ABE',   desc:'약정 계약 엔티티' },
  Account:       { domain:'Party ABE',   desc:'청구 계정' },
};

// 상태 머신 정의
const STATES = {
  idle:               { label:'가입신청',   icon:'📝', color:'#64748b' },
  order_created:      { label:'주문생성',   icon:'📋', color:'#d97706' },
  identity_verified:  { label:'본인인증',   icon:'🪪', color:'#8b5cf6' },
  activating:         { label:'개통중',     icon:'⚡', color:'#3b82f6' },
  active:             { label:'이용중',     icon:'✅', color:'#16a34a' },
  suspended:          { label:'일시정지',   icon:'⏸', color:'#f97316' },
  terminating:        { label:'해지처리',   icon:'🔄', color:'#ef4444' },
  terminated:         { label:'해지완료',   icon:'⛔', color:'#6b7280' },
};
const STATE_FLOW = ['idle','order_created','identity_verified','activating','active','suspended','terminated'];

function generateMSISDN() {
  return '010-' + String(Math.floor(1000+Math.random()*9000)) + '-' + String(Math.floor(1000+Math.random()*9000));
}
function generateICCID() {
  return '8921010' + String(Math.floor(100000000000+Math.random()*899999999999));
}
function generateOrderId() {
  return 'ORD-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
}
function currency(n) { return n.toLocaleString('ko-KR') + '원'; }
function ts() { return new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }

// ══════════════════════════════════════════════
// 서브 컴포넌트
// ══════════════════════════════════════════════

function TopNav() {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'11px 24px', background:'#0a0f1c', borderBottom:'1px solid #1e293b' }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ fontSize:20 }}>📡</span>
        <span style={{ fontWeight:800, fontSize:15, color:'#f1f5f9' }}>통신 서비스 라이프사이클 시뮬레이터</span>
        <span className="tag tag-teal" style={{ marginLeft:4 }}>TM Forum eTOM · SID · Open API</span>
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <a href="index.html" style={{ display:'inline-flex', alignItems:'center', gap:5,
          padding:'6px 13px', borderRadius:7, background:'#1e293b', color:'#cbd5e1',
          textDecoration:'none', fontSize:12, fontWeight:600, border:'1px solid #334155' }}>
          ← 상품 출시 시뮬레이터
        </a>
        <a href="product-launch-db-schema.html" style={{ display:'inline-flex', alignItems:'center', gap:5,
          padding:'6px 13px', borderRadius:7, background:'#1e293b', color:'#cbd5e1',
          textDecoration:'none', fontSize:12, fontWeight:600, border:'1px solid #334155' }}>
          🗄 DB 구조도
        </a>
      </div>
    </div>
  );
}

function LifecycleBar({ state, planChanges }) {
  const mainFlow = ['idle','order_created','identity_verified','activating','active','terminated'];
  const cur = STATES[state];
  const curIdx = mainFlow.indexOf(state === 'suspended' || state === 'terminating' ? 'active' : state);
  return (
    <div style={{ background:'#0a0f1c', borderBottom:'1px solid #1e293b', padding:'14px 24px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:0 }}>
        {mainFlow.map((s, i) => {
          const st = STATES[s];
          const done = i < curIdx || (state === 'terminated' && s === 'terminated');
          const active = state === s || (state === 'suspended' && s === 'active') || (state === 'terminating' && s === 'terminated');
          return (
            <React.Fragment key={s}>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, position:'relative' }}>
                <div style={{
                  width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center',
                  justifyContent:'center', fontSize:16,
                  background: done ? '#15803d' : active ? st.color : '#1e293b',
                  border: `2px solid ${done ? '#16a34a' : active ? st.color : '#334155'}`,
                  boxShadow: active ? `0 0 0 3px ${st.color}44` : 'none',
                  transition:'all .3s',
                }}>
                  {done ? '✓' : st.icon}
                </div>
                <span style={{ fontSize:10, color: active ? st.color : done ? '#4ade80' : '#475569',
                  fontWeight: active ? 700 : 400, whiteSpace:'nowrap' }}>
                  {st.label}
                </span>
                {/* 부가 표시 */}
                {s === 'active' && state === 'suspended' && (
                  <span style={{ position:'absolute', top:-6, right:-6, background:'#f97316',
                    color:'#fff', fontSize:9, padding:'1px 4px', borderRadius:3, fontWeight:700 }}>⏸</span>
                )}
                {s === 'active' && planChanges > 0 && state === 'active' && (
                  <span style={{ position:'absolute', top:-6, right:-8, background:'#8b5cf6',
                    color:'#fff', fontSize:9, padding:'1px 4px', borderRadius:3, fontWeight:700 }}>변경{planChanges}</span>
                )}
              </div>
              {i < mainFlow.length - 1 && (
                <div style={{ flex:1, height:2, background: i < curIdx ? '#16a34a' : '#1e293b',
                  margin:'0 4px', marginBottom:18, borderRadius:1, transition:'background .3s', minWidth:20 }} />
              )}
            </React.Fragment>
          );
        })}
      </div>
      {/* 현재 상태 */}
      <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:10 }}>
        <div style={{ width:8, height:8, borderRadius:'50%', background:cur.color,
          animation: (state==='activating'||state==='terminating') ? 'pulse 1.5s infinite' : 'none' }} />
        <span style={{ fontSize:12, color:cur.color, fontWeight:700 }}>현재 상태: {cur.label}</span>
        {(state==='activating'||state==='terminating') &&
          <span className="tag tag-yellow animate-pulse">처리중...</span>}
        {state==='active' && <span className="tag tag-green">서비스 정상</span>}
        {state==='suspended' && <span className="tag tag-orange">서비스 중단</span>}
        {state==='terminated' && <span className="tag tag-gray">계약 종료</span>}
      </div>
    </div>
  );
}

// 왼쪽 패널 — SID 엔티티
function LeftPanel({ customer, plan, resource, agreement, addons, state }) {
  const hasCustomer = customer.name;
  const hasPlan = !!plan;
  const hasResource = !!resource.msisdn;

  return (
    <div style={{ width:268, flexShrink:0, display:'flex', flexDirection:'column', gap:10,
      overflowY:'auto', paddingRight:4 }}>

      {/* Party / Customer */}
      <div className="card-sm">
        <div className="section-title">SID — Party / Customer</div>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
          <div style={{ width:36, height:36, borderRadius:'50%', background: hasCustomer ? '#1d4ed8' : '#1e293b',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, border:'2px solid #334155' }}>
            {hasCustomer ? '👤' : '?'}
          </div>
          <div>
            <div style={{ fontWeight:700, fontSize:13, color: hasCustomer ? '#f1f5f9' : '#475569' }}>
              {hasCustomer ? customer.name : '미등록'}
            </div>
            <div style={{ fontSize:11, color:'#64748b' }}>{hasCustomer ? customer.id : '고객 정보 없음'}</div>
          </div>
        </div>
        {hasCustomer && (<>
          <SIDRow label="생년월일" value={customer.birth} />
          <SIDRow label="연락처" value={customer.phone} />
          <SIDRow label="본인인증" value={customer.verified ? '✅ 완료' : '⏳ 미완료'} highlight={customer.verified} />
          <SIDRow label="가입일시" value={customer.joinedAt || '—'} />
        </>)}
        <div style={{ display:'flex', gap:4, marginTop:8, flexWrap:'wrap' }}>
          <span className="tag tag-blue">TMF632</span>
          <span className="tag tag-gray">Party ABE</span>
          <span className="tag tag-purple">OP.2.1</span>
        </div>
      </div>

      {/* Product */}
      <div className="card-sm">
        <div className="section-title">SID — Product / Agreement</div>
        {hasPlan ? (
          <>
            <div style={{ background:'linear-gradient(135deg,#1d4ed8,#7c3aed)', borderRadius:8,
              padding:10, marginBottom:8, color:'#fff' }}>
              <div style={{ fontSize:11, opacity:.8 }}>구독 상품</div>
              <div style={{ fontSize:15, fontWeight:800 }}>{plan.name}</div>
              <div style={{ fontSize:13, fontWeight:600, opacity:.9 }}>{currency(plan.price)}/월</div>
            </div>
            <SIDRow label="데이터" value={plan.data} />
            <SIDRow label="속도" value={plan.speed} />
            <SIDRow label="음성" value={plan.voice} />
            {agreement && <SIDRow label="약정" value={agreement.name} />}
            {addons.length > 0 && (
              <div style={{ marginTop:6 }}>
                <div style={{ fontSize:10, color:'#64748b', marginBottom:4 }}>부가서비스 ({addons.length})</div>
                {addons.map(a => (
                  <div key={a.id} style={{ fontSize:11, color:'#94a3b8', marginBottom:2 }}>
                    {a.icon} {a.name}
                  </div>
                ))}
              </div>
            )}
          </>
        ) : (
          <div style={{ color:'#475569', fontSize:12, textAlign:'center', padding:'10px 0' }}>상품 미선택</div>
        )}
        <div style={{ display:'flex', gap:4, marginTop:8, flexWrap:'wrap' }}>
          <span className="tag tag-blue">TMF622</span>
          <span className="tag tag-blue">TMF637</span>
          <span className="tag tag-gray">Product ABE</span>
        </div>
      </div>

      {/* Resource */}
      <div className="card-sm">
        <div className="section-title">SID — Service / Resource</div>
        {hasResource ? (
          <>
            <SIDRow label="MSISDN" value={resource.msisdn} highlight />
            <SIDRow label="ICCID" value={resource.iccid ? resource.iccid.slice(0,12)+'...' : '—'} />
            <SIDRow label="네트워크" value={resource.network || '—'} />
            <SIDRow label="서비스 상태" value={
              state==='active' ? '✅ 활성' :
              state==='suspended' ? '⏸ 정지' :
              state==='terminated' ? '⛔ 해지' : '⏳ 처리중'} />
          </>
        ) : (
          <div style={{ color:'#475569', fontSize:12, textAlign:'center', padding:'10px 0' }}>
            번호 미할당
          </div>
        )}
        <div style={{ display:'flex', gap:4, marginTop:8, flexWrap:'wrap' }}>
          <span className="tag tag-blue">TMF638</span>
          <span className="tag tag-blue">TMF639</span>
          <span className="tag tag-gray">Resource ABE</span>
        </div>
      </div>

      {/* Account */}
      <div className="card-sm">
        <div className="section-title">SID — Account / Billing</div>
        {hasPlan && hasResource ? (
          <>
            <SIDRow label="계정 ID" value={'ACC-' + (customer.id || '—').slice(-6)} />
            <SIDRow label="청구 주기" value="매월 1일" />
            <SIDRow label="예상 청구액" value={currency((plan?.price||0) + addons.reduce((s,a)=>s+a.price,0))} highlight />
          </>
        ) : (
          <div style={{ color:'#475569', fontSize:12, textAlign:'center', padding:'8px 0' }}>계정 미생성</div>
        )}
        <div style={{ display:'flex', gap:4, marginTop:8, flexWrap:'wrap' }}>
          <span className="tag tag-blue">TMF666</span>
          <span className="tag tag-blue">TMF678</span>
          <span className="tag tag-gray">Party ABE</span>
        </div>
      </div>
    </div>
  );
}

function SIDRow({ label, value, highlight }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', padding:'3px 0',
      borderBottom:'1px solid #0f172a', fontSize:11 }}>
      <span style={{ color:'#64748b' }}>{label}</span>
      <span style={{ color: highlight ? '#60a5fa' : '#cbd5e1', fontWeight: highlight ? 600 : 400,
        maxWidth:140, textAlign:'right', wordBreak:'break-all' }}>{value}</span>
    </div>
  );
}

// 오른쪽 패널 — 이벤트 로그
function EventLog({ events }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [events]);

  const methodColor = { POST:'#4ade80', PATCH:'#fbbf24', DELETE:'#f87171', GET:'#60a5fa' };
  const statusColor = (s) => s >= 200 && s < 300 ? '#4ade80' : s >= 400 ? '#f87171' : '#fbbf24';

  return (
    <div style={{ width:300, flexShrink:0, display:'flex', flexDirection:'column', gap:0 }}>
      <div style={{ padding:'10px 14px', background:'#0a0f1c', borderRadius:'10px 10px 0 0',
        border:'1px solid #334155', borderBottom:'none', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:12, fontWeight:700, color:'#94a3b8' }}>📡 API 이벤트 로그</span>
        <span style={{ fontSize:10, color:'#475569' }}>{events.length} events</span>
      </div>
      <div ref={ref} style={{ flex:1, overflowY:'auto', maxHeight:'calc(100vh - 260px)',
        background:'#0a0f1c', border:'1px solid #334155', borderTop:'none', borderRadius:'0 0 10px 10px',
        padding:10, display:'flex', flexDirection:'column', gap:6 }}>
        {events.length === 0 && (
          <div style={{ color:'#334155', fontSize:12, textAlign:'center', padding:'20px 0' }}>
            이벤트 없음<br/>
            <span style={{ fontSize:10, color:'#1e293b' }}>가입 신청 시 로그가 쌓입니다</span>
          </div>
        )}
        {events.map((e, i) => (
          <div key={i} className="animate-fade" style={{ background:'#0f172a', border:'1px solid #1e293b',
            borderLeft:`3px solid ${e.level==='error'?'#ef4444':e.level==='warn'?'#f59e0b':'#3b82f6'}`,
            borderRadius:6, padding:'7px 9px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:4, flexWrap:'wrap' }}>
              <span style={{ fontSize:9, color:'#475569', fontFamily:'monospace' }}>{e.time}</span>
              <span className="tag" style={{ background:'#0f2744',
                color: methodColor[e.method] || '#94a3b8', fontSize:9 }}>{e.method}</span>
              <span className="tag tag-blue" style={{ fontSize:9 }}>{e.api}</span>
              <span className="tag" style={{ background:'#0f172a', color:statusColor(e.status), fontSize:9,

      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6, flexWrap:'wrap' }}>
        <span className="tag tag-purple">{p.code} {p.name}</span>
        <span className="tag tag-gray">{p.domain}</span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
        <span className="tag tag-green" style={{ fontSize:10 }}>{method}</span>
        <span className="tag tag-blue" style={{ fontSize:10 }}>{api}</span>
        <code style={{ fontSize:10, color:'#60a5fa', fontFamily:'monospace' }}>{endpoint}</code>
      </div>
      <div style={{ fontSize:11, color:'#475569', marginTop:5 }}>→ {step}</div>
    </div>
  );
}

function ActionCard({ icon, title, color, desc, api, etom, btnLabel, btnClass, onClick }) {
  return (
    <div style={{ background:'#0f172a', border:`1px solid #1e293b`, borderLeft:`3px solid ${color}`,
      borderRadius:9, padding:12 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
        <span style={{ fontSize:20 }}>{icon}</span>
        <span style={{ fontWeight:700, fontSize:14, color:'#f1f5f9' }}>{title}</span>
      </div>
      <div style={{ fontSize:12, color:'#64748b', marginBottom:8 }}>{desc}</div>
      <div style={{ display:'flex', gap:4, marginBottom:10, flexWrap:'wrap' }}>
        <span className="tag tag-blue" style={{ fontSize:9 }}>{api}</span>
        <span className="tag tag-purple" style={{ fontSize:9 }}>{etom}</span>
      </div>
      <button className={`btn ${btnClass}`} style={{ fontSize:12 }} onClick={onClick}>{btnLabel}</button>
    </div>
  );
}

// TM Forum 참조 패널 (하단)
function TmForumRefPanel({ state }) {
  const refs = {
    idle:              ['TMF622','TMF632','TMF620'],
    order_created:     ['TMF622','TMF632'],
    identity_verified: ['TMF622','TMF641','TMF639'],
    activating:        ['TMF641','TMF639','TMF638'],
    active:            ['TMF637','TMF638','TMF622','TMF666','TMF678'],
    suspended:         ['TMF622','TMF641'],
    terminating:       ['TMF622','TMF639','TMF678'],
    terminated:        ['TMF666','TMF678'],
  };
  const relevant = refs[state] || [];
  return (
    <div style={{ background:'#0a0f1c', borderTop:'1px solid #1e293b', padding:'10px 24px',
      display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
      <span style={{ fontSize:10, color:'#475569', fontWeight:700, flexShrink:0 }}>TM Forum Open APIs</span>
      {relevant.map(api => (
        <div key={api} style={{ display:'flex', alignItems:'center', gap:5 }}>
          <span className="tag tag-blue" style={{ fontSize:10 }}>{api}</span>
          <span style={{ fontSize:10, color:'#334155' }}>{TMF_APIS[api]}</span>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════
// 메인 App
// ══════════════════════════════════════════════
function App() {
  const [state, setState]         = useState('idle');
  const [customer, setCustomer]   = useState({});
  const [plan, setPlan]           = useState(null);
  const [agreement, setAgreement] = useState(null);
  const [addons, setAddons]       = useState([]);
  const [resource, setResource]   = useState({});
  const [orderId, setOrderId]     = useState('');
  const [events, setEvents]       = useState([]);
  const [progress, setProgress]   = useState(0);
  const [planChanges, setPlanChanges] = useState(0);

  const addEvent = useCallback((ev) => {
    setEvents(prev => [...prev, { ...ev, time: ts() }]);
  }, []);

  // 개통/해지 자동 진행
  useEffect(() => {
    if (state === 'activating') {
      setProgress(0);
      const steps = [
        [500,  20, { method:'POST', api:'TMF641', status:201, endpoint:'/serviceOrder', desc:'Service Order 생성', etom:'OP.3.4', sid:'ServiceOrder' }],
        [1200, 40, { method:'POST', api:'TMF639', status:201, endpoint:'/resource (MSISDN 할당)', desc:`MSISDN ${resource.msisdn} 할당 완료`, etom:'OP.4.2', sid:'Resource' }],
        [1900, 60, { method:'PATCH', api:'TMF641', status:200, endpoint:'/serviceOrder/{id}', desc:'SIM 프로파일 다운로드 완료', etom:'OP.3.4', sid:'Service' }],
        [2600, 80, { method:'POST', api:'TMF639', status:201, endpoint:'/resource (networkPort)', desc:'네트워크 포트 개통', etom:'OP.4.2', sid:'Resource' }],
        [3300,100, { method:'POST', api:'TMF638', status:201, endpoint:'/service', desc:'서비스 인스턴스 등록 완료 → ACTIVE', etom:'OP.3.4', sid:'Service' }],
      ];
      const timers = steps.map(([delay, prog, ev]) =>
        setTimeout(() => { setProgress(prog); addEvent(ev); if (prog===100) setTimeout(()=>setState('active'),400); }, delay)
      );
      return () => timers.forEach(clearTimeout);
    }
    if (state === 'terminating') {
      setProgress(0);
      const steps = [
        [500,  25, { method:'POST', api:'TMF622', status:201, endpoint:'/productOrder (terminate)', desc:'해지 Order 생성', etom:'OP.2.2' }],
        [1100, 50, { method:'DELETE', api:'TMF622', status:200, endpoint:'/product/{id}/addons', desc:'부가서비스 일괄 해제', etom:'OP.2.2' }],
        [1700, 75, { method:'PATCH', api:'TMF639', status:200, endpoint:'/resource/{msisdn}', desc:'MSISDN 반납 처리', etom:'OP.4.2' }],
        [2300,100, { method:'POST', api:'TMF678', status:201, endpoint:'/appliedCustomerBillingRate', desc:'최종 정산 완료 → TERMINATED', etom:'OP.2.5' }],
      ];
      const timers = steps.map(([delay, prog, ev]) =>
        setTimeout(() => { setProgress(prog); addEvent(ev); if (prog===100) setTimeout(()=>setState('terminated'),400); }, delay)
      );
      return () => timers.forEach(clearTimeout);
    }
  }, [state]);

  // 가입 신청
  const handleIdle = (form) => {
    const selectedPlan = PLANS.find(p=>p.id===form.plan);
    const selectedContract = CONTRACT_OPTIONS.find(c=>c.id===form.contract);
    const oid = generateOrderId();
    const cid = 'CUS-' + Date.now().toString(36).toUpperCase().slice(-6);
    setCustomer({ name:form.name, birth:form.birth, phone:form.phone, email:form.email, id:cid, verified:false });
    setPlan(selectedPlan);
    setAgreement(selectedContract);
    setOrderId(oid);
    setResource({});
    addEvent({ method:'POST', api:'TMF622', status:201, endpoint:'/productOrder', desc:`주문 생성 완료 — ${selectedPlan?.name}`, etom:'OP.2.2', sid:'ProductOrder', level:'info' });
    addEvent({ method:'POST', api:'TMF666', status:201, endpoint:'/billingAccount', desc:'청구 계정 생성', etom:'OP.2.5', sid:'Account', level:'info' });
    setState('order_created');
  };

  // 본인인증
  const handleVerify = () => {
    setCustomer(p=>({ ...p, verified:true, joinedAt:new Date().toLocaleString('ko-KR') }));
    const msisdn = generateMSISDN();
    const iccid  = generateICCID();
    setResource({ msisdn, iccid, network: plan?.type || '5G' });
    addEvent({ method:'PATCH', api:'TMF632', status:200, endpoint:'/individual/{id}/checkIdentity', desc:'본인인증 완료 (PASS)', etom:'OP.2.1', sid:'Party', level:'info' });
    addEvent({ method:'GET',   api:'TMF639', status:200, endpoint:`/resource?type=MSISDN&status=available`, desc:`가용 MSISDN 조회 → ${msisdn}`, etom:'OP.4.2', sid:'Resource', level:'info' });
    setState('identity_verified');
  };

  // 개통 시작
  const handleActivate = () => {
    addEvent({ method:'POST', api:'TMF641', status:201, endpoint:'/serviceOrder', desc:'서비스 개통 Order 생성', etom:'OP.3.4', sid:'ServiceOrder', level:'info' });
    setState('activating');
  };

  // 요금제 변경
  const handlePlanChange = (newPlan) => {
    const old = plan?.name;
    setPlan(newPlan);
    setPlanChanges(c=>c+1);
    addEvent({ method:'POST', api:'TMF622', status:201, endpoint:'/productOrder (amendmentType:changePlan)', desc:`요금제 변경: ${old} → ${newPlan.name}`, etom:'OP.2.2', sid:'ProductOrder', level:'info' });
    addEvent({ method:'PATCH', api:'TMF637', status:200, endpoint:'/product/{id}', desc:'Product Inventory 업데이트', etom:'OP.2.2', sid:'Product', level:'info' });
  };

  // 부가서비스 토글
  const handleAddonToggle = (addon) => {
    const on = addons.some(a=>a.id===addon.id);
    setAddons(prev => on ? prev.filter(a=>a.id!==addon.id) : [...prev, addon]);
    addEvent({
      method: on ? 'DELETE' : 'POST', api:'TMF622', status: on ? 200 : 201,
      endpoint: on ? `/product/${addon.id}` : '/productOrder (add addon)',
      desc: `부가서비스 ${on?'해제':'추가'}: ${addon.name}`, etom:'OP.2.2', sid:'ProductOrder', level:'info',
    });
  };

  // 일시정지
  const handleSuspend = () => {
    addEvent({ method:'POST', api:'TMF622', status:201, endpoint:'/productOrder (suspend)', desc:'서비스 일시정지 처리', etom:'OP.2.4', sid:'ProductOrder', level:'warn' });
    addEvent({ method:'PATCH', api:'TMF641', status:200, endpoint:'/serviceOrder/{id}?action=suspend', desc:'Service Order 일시정지 적용', etom:'OP.3.4', sid:'Service', level:'warn' });
    setState('suspended');
  };

  // 재개통
  const handleResume = () => {
    addEvent({ method:'POST', api:'TMF622', status:201, endpoint:'/productOrder (resume)', desc:'서비스 재개통 처리', etom:'OP.2.4', sid:'ProductOrder', level:'info' });
    addEvent({ method:'PATCH', api:'TMF641', status:200, endpoint:'/serviceOrder/{id}?action=resume', desc:'Service 재활성화 완료', etom:'OP.3.4', sid:'Service', level:'info' });
    setState('active');
  };

  // 해지
  const handleTerminate = () => {
    addEvent({ method:'POST', api:'TMF622', status:201, endpoint:'/productOrder (terminate)', desc:'해지 신청 접수', etom:'OP.2.2', sid:'ProductOrder', level:'error' });
    setState('terminating');
  };

  // 초기화
  const handleReset = () => {
    setState('idle'); setCustomer({}); setPlan(null); setAgreement(null);
    setAddons([]); setResource({}); setOrderId(''); setEvents([]); setProgress(0); setPlanChanges(0);
  };

  const stateLabel = STATES[state];

  const centerContent = {
    idle:               { title:'가입 신청',       sub:'고객 정보 입력 및 요금제 선택' },
    order_created:      { title:'본인인증',         sub:'PASS 또는 신분증으로 본인 확인' },
    identity_verified:  { title:'개통 준비',        sub:'서비스 개통 전 최종 확인' },
    activating:         { title:'개통 처리중',      sub:'리소스 프로비저닝 자동 진행' },
    active:             { title:'서비스 이용중',    sub:'요금제 변경·부가서비스·서비스 관리' },
    suspended:          { title:'서비스 일시정지', sub:'재개통 또는 해지 선택' },
    terminating:        { title:'해지 처리중',      sub:'정산 및 리소스 반납 자동 진행' },
    terminated:         { title:'해지 완료',        sub:'서비스가 종료되었습니다' },
  }[state];

  return (
    <div style={{ minHeight:'100vh', background:'#0f172a', display:'flex', flexDirection:'column' }}>
      <TopNav />
      <LifecycleBar state={state} planChanges={planChanges} />

      <div style={{ flex:1, display:'flex', gap:0, overflow:'hidden' }}>
        {/* 왼쪽 — SID 엔티티 */}
        <div style={{ width:284, flexShrink:0, borderRight:'1px solid #1e293b',
          padding:'16px 12px', overflowY:'auto' }}>
          <LeftPanel customer={customer} plan={plan} resource={resource}
            agreement={agreement} addons={addons} state={state} />
        </div>

        {/* 가운데 — 액션 */}
        <div style={{ flex:1, padding:'16px 20px', overflowY:'auto' }}>
          <div style={{ maxWidth:680, margin:'0 auto' }}>
            {/* 단계 헤더 */}
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
              <div style={{ width:40, height:40, borderRadius:'50%', background:stateLabel.color+'22',
                border:`2px solid ${stateLabel.color}`, display:'flex', alignItems:'center',
                justifyContent:'center', fontSize:20 }}>{stateLabel.icon}</div>
              <div>
                <h2 style={{ fontSize:16, fontWeight:800, color:'#f1f5f9', margin:0 }}>{centerContent.title}</h2>
                <p style={{ fontSize:11, color:'#64748b', margin:0 }}>{centerContent.sub}</p>
              </div>
              <div style={{ marginLeft:'auto', display:'flex', gap:6, flexWrap:'wrap' }}>
                {orderId && <span className="tag tag-gray" style={{ fontSize:10 }}>{orderId}</span>}
              </div>
            </div>

            {/* 단계별 콘텐츠 */}
            <div style={{ background:'#1e293b', border:'1px solid #334155', borderRadius:14, padding:20 }}>
              {state === 'idle'              && <StepIdle onSubmit={handleIdle} />}
              {state === 'order_created'     && <StepOrderCreated orderId={orderId} customer={customer} onVerify={handleVerify} />}
              {state === 'identity_verified' && <StepIdentityVerified plan={plan} onActivate={handleActivate} />}
              {state === 'activating'        && <StepActivating progress={progress} />}
              {state === 'active'            && <StepActive plan={plan} addons={addons} onPlanChange={handlePlanChange} onAddonToggle={handleAddonToggle} onSuspend={handleSuspend} onTerminate={handleTerminate} />}
              {state === 'suspended'         && <StepSuspended onResume={handleResume} onTerminate={handleTerminate} />}
              {state === 'terminating'       && <StepTerminating progress={progress} />}
              {state === 'terminated'        && <StepTerminated customer={customer} plan={plan} resource={resource} onReset={handleReset} />}
            </div>
          </div>
        </div>

        {/* 오른쪽 — 이벤트 로그 */}
        <div style={{ width:316, flexShrink:0, borderLeft:'1px solid #1e293b',
          padding:'16px 12px', overflowY:'auto' }}>
          <EventLog events={events} />
        </div>
      </div>

      <TmForumRefPanel state={state} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
