<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📱 통신사 상품 시뮬레이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
    input, select, textarea, button { font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #2563eb; outline-offset: 1px; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.45; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ══════════════════════════════════════════════════════════════
// 공통 네비게이션
// ══════════════════════════════════════════════════════════════
function TopNav({ page, setPage }) {
  return (
    <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", height:52, position:"sticky", top:0, zIndex:100, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
      <div style={{ display:"flex", alignItems:"center", gap:20 }}>
        <span style={{ fontSize:15, fontWeight:800, color:"#1e293b", letterSpacing:"-0.3px", whiteSpace:"nowrap" }}>📱 통신사 시뮬레이터</span>
        <div style={{ display:"flex", gap:2 }}>
          {[["launch","📦 상품 출시"],["lifecycle","🔄 라이프사이클"]].map(([key,label])=>(
            <button key={key} onClick={()=>setPage(key)} style={{ padding:"6px 14px", borderRadius:7, border:"none", cursor:"pointer", fontSize:13, fontWeight:600, background:page===key?"#eff6ff":"transparent", color:page===key?"#2563eb":"#64748b", transition:"all .15s" }}>
              {label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", gap:6 }}>
        {page==="lifecycle" && (
          <a href="lifecycle-simulator.html" style={{ padding:"6px 12px", borderRadius:7, border:"1px solid #e2e8f0", background:"transparent", color:"#64748b", fontSize:12, fontWeight:600, textDecoration:"none", display:"inline-flex", alignItems:"center", gap:4 }}>
            📋 TM Forum 참조
          </a>
        )}
        <a href="product-launch-db-schema.html" style={{ padding:"6px 12px", borderRadius:7, border:"1px solid #e2e8f0", background:"transparent", color:"#64748b", fontSize:12, fontWeight:600, textDecoration:"none", display:"inline-flex", alignItems:"center", gap:4 }}>
          🗄 DB 구조도
        </a>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 1. 상품 출시 시뮬레이터 (원본)
// ══════════════════════════════════════════════════════════════
const FEATURE_CATALOG = {
  network: [
    { id: "5g_sa",   name: "5G SA (독립형)",    icon: "📡", desc: "지연 1ms, 최대 20Gbps",   cost: 30000 },
    { id: "5g_nsa",  name: "5G NSA (비독립형)", icon: "📶", desc: "최대 1Gbps, LTE 혼용",    cost: 18000 },
    { id: "lte_adv", name: "LTE-A Pro",          icon: "🔗", desc: "최대 500Mbps, 광대역",   cost: 10000 },
    { id: "wifi6",   name: "Wi-Fi 6E 연동",      icon: "📲", desc: "실내 초고속 연동",        cost: 5000  },
  ],
  data: [
    { id: "data_unlimited", name: "데이터 완전 무제한", icon: "♾️", desc: "속도 제한 없음",       cost: 25000 },
    { id: "data_100gb",     name: "데이터 100GB",       icon: "💾", desc: "소진 후 1Mbps 유지",  cost: 12000 },
    { id: "data_30gb",      name: "데이터 30GB",         icon: "📦", desc: "소진 후 400Kbps",     cost: 6000  },
    { id: "tethering",      name: "테더링 무제한",       icon: "🔌", desc: "핫스팟 속도 제한 없음", cost: 8000 },
  ],
  ott: [
    { id: "netflix",  name: "넷플릭스 4K",       icon: "🎬", desc: "4K UHD 스트리밍",    cost: 17000 },
    { id: "youtube",  name: "유튜브 프리미엄",   icon: "▶️", desc: "광고 없는 유튜브",    cost: 14000 },
    { id: "wavve",    name: "웨이브 오리지널",   icon: "🌊", desc: "국내 드라마/영화",    cost: 7900  },
    { id: "spotify",  name: "스포티파이 Premium",icon: "🎵", desc: "무손실 음원",          cost: 10900 },
  ],
  benefit: [
    { id: "roaming_asia",   name: "아시아 로밍 무료",     icon: "✈️", desc: "아시아 15개국 데이터",  cost: 9000  },
    { id: "roaming_global", name: "글로벌 로밍 패키지",   icon: "🌍", desc: "전 세계 80개국",        cost: 20000 },
    { id: "call_unlimited", name: "음성통화 무제한",       icon: "📞", desc: "이동·시내·시외 무제한", cost: 4000  },
    { id: "sms_unlimited",  name: "문자 무제한",           icon: "✉️", desc: "SMS/MMS 무제한",        cost: 1000  },
    { id: "family_share",   name: "가족 결합 할인",        icon: "👨‍👩‍👧", desc: "최대 4회선 20% 할인",  cost: -8000 },
  ],
};

const CATEGORY_LABEL = {
  network: "📡 네트워크 기술",
  data:    "💾 데이터 옵션",
  ott:     "🎬 OTT / 미디어",
  benefit: "🎁 부가 혜택",
};

const STEPS = [
  { id: "configure", label: "기능 구성", icon: "⚙️" },
  { id: "review",    label: "검토",      icon: "🔍" },
  { id: "approve",   label: "승인",      icon: "✅" },
  { id: "launch",    label: "출시",      icon: "🚀" },
];
const STEP_IDX = { configure: 0, review: 1, approve: 2, launch: 3 };

function currency(n) { return n.toLocaleString("ko-KR") + "원"; }

function Badge({ status }) {
  const map = {
    draft:    { label: "초안",    color: "#64748b" },
    review:   { label: "검토중",  color: "#d97706" },
    approved: { label: "승인완료",color: "#2563eb" },
    launched: { label: "출시완료",color: "#16a34a" },
    rejected: { label: "반려",    color: "#dc2626" },
  };
  const s = map[status] || map.draft;
  return (
    <span style={{ background: s.color, color: "#fff", padding: "3px 10px", borderRadius: 12, fontSize: 12, fontWeight: 700 }}>
      {s.label}
    </span>
  );
}

function StepBar({ current }) {
  const ci = STEP_IDX[current];
  return (
    <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
      {STEPS.map((s, i) => {
        const done   = i < ci;
        const active = i === ci;
        return (
          <React.Fragment key={s.id}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <div style={{
                width: 38, height: 38, borderRadius: "50%",
                background: done ? "#16a34a" : active ? "#2563eb" : "#e2e8f0",
                color: done || active ? "#fff" : "#94a3b8",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: done ? 16 : 18, fontWeight: 700,
                boxShadow: active ? "0 0 0 4px #bfdbfe" : "none",
                transition: "all 0.3s",
              }}>
                {done ? "✓" : s.icon}
              </div>
              <span style={{ fontSize: 11, color: active ? "#2563eb" : done ? "#16a34a" : "#94a3b8", fontWeight: active ? 700 : 400, whiteSpace: "nowrap" }}>
                {s.label}
              </span>
            </div>
            {i < STEPS.length - 1 && (
              <div style={{ flex: 1, height: 3, background: done ? "#16a34a" : "#e2e8f0", margin: "0 4px", marginBottom: 18, borderRadius: 2, transition: "background 0.3s" }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function InfoRow({ label, value }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>{label}</div>
      <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{value}</div>
    </div>
  );
}

const card        = { background:"#fff", borderRadius:14, padding:20, boxShadow:"0 1px 4px rgba(0,0,0,0.08)", border:"1px solid #f1f5f9" };
const sectionTitle= { fontSize:15, fontWeight:700, color:"#1e293b", marginBottom:14, marginTop:0 };
const labelStyle  = { display:"block", fontSize:12, fontWeight:600, color:"#64748b", marginBottom:4 };
const inputStyle  = { width:"100%", padding:"9px 12px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, color:"#1e293b", outline:"none", boxSizing:"border-box", background:"#fff" };
const btnBase     = { padding:"10px 20px", borderRadius:9, border:"none", cursor:"pointer", fontSize:14, fontWeight:700, transition:"all 0.2s" };
const btnPrimary  = { ...btnBase, background:"#2563eb", color:"#fff" };
const btnSecondary= { ...btnBase, background:"#f1f5f9", color:"#475569" };
const btnDanger   = { ...btnBase, background:"#fee2e2", color:"#dc2626" };
const btnSuccess  = { ...btnBase, background:"#16a34a", color:"#fff" };

const TARGET_LABEL   = { all:"전체 고객", new:"신규 가입자", premium:"프리미엄 등급", enterprise:"기업 고객" };
const CONTRACT_LABEL = { monthly:"월정", "12month":"12개월", "24month":"24개월" };

function ConfigureStep({ product, setProduct, selected, setSelected, onNext }) {
  const toggleFeature = useCallback((feat) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(feat.id) ? next.delete(feat.id) : next.add(feat.id);
      return next;
    });
  }, [setSelected]);

  const allFeatures    = Object.values(FEATURE_CATALOG).flat();
  const selFeats       = allFeatures.filter(f => selected.has(f.id));
  const featureTotal   = selFeats.reduce((s, f) => s + f.cost, 0);
  const finalPrice     = (product.basePrice || 0) + featureTotal;
  const canProceed     = product.name.trim() && product.basePrice > 0 && selected.size > 0;

  return (
    <div style={{ display:"flex", gap:20, alignItems:"flex-start" }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={card}>
          <h3 style={sectionTitle}>📋 기본 정보</h3>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <div>
              <label style={labelStyle}>상품명 *</label>
              <input style={inputStyle} placeholder="예: 5G 프리미엄 플러스" value={product.name}
                onChange={e => setProduct(p => ({ ...p, name: e.target.value }))} />
            </div>
            <div>
              <label style={labelStyle}>기본료 (원) *</label>
              <input style={inputStyle} type="number" placeholder="예: 55000" value={product.basePrice || ""}
                onChange={e => setProduct(p => ({ ...p, basePrice: Number(e.target.value) }))} />
            </div>
          </div>
          <div style={{ marginBottom:12 }}>
            <label style={labelStyle}>상품 설명</label>
            <textarea style={{ ...inputStyle, height:64, resize:"vertical" }}
              placeholder="고객에게 보여질 상품 설명을 입력하세요"
              value={product.description}
              onChange={e => setProduct(p => ({ ...p, description: e.target.value }))} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <div>
              <label style={labelStyle}>출시 대상</label>
              <select style={inputStyle} value={product.target} onChange={e => setProduct(p => ({ ...p, target: e.target.value }))}>
                <option value="all">전체 고객</option>
                <option value="new">신규 가입자</option>
                <option value="premium">프리미엄 등급</option>
                <option value="enterprise">기업 고객</option>
              </select>
            </div>
            <div>
              <label style={labelStyle}>계약 기간</label>
              <select style={inputStyle} value={product.contract} onChange={e => setProduct(p => ({ ...p, contract: e.target.value }))}>
                <option value="monthly">월정</option>
                <option value="12month">12개월</option>
                <option value="24month">24개월</option>
              </select>
            </div>
          </div>
        </div>

        {Object.entries(FEATURE_CATALOG).map(([cat, features]) => (
          <div key={cat} style={{ ...card, marginTop:12 }}>
            <h3 style={sectionTitle}>{CATEGORY_LABEL[cat]}</h3>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {features.map(feat => {
                const on = selected.has(feat.id);
                return (
                  <div key={feat.id} onClick={() => toggleFeature(feat)} style={{
                    border: `2px solid ${on ? "#2563eb" : "#e2e8f0"}`,
                    borderRadius:10, padding:"10px 12px", cursor:"pointer",
                    background: on ? "#eff6ff" : "#fff", transition:"all 0.2s",
                    display:"flex", alignItems:"center", gap:10,
                  }}>
                    <span style={{ fontSize:22 }}>{feat.icon}</span>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:600, fontSize:13, color: on ? "#1d4ed8" : "#1e293b" }}>{feat.name}</div>
                      <div style={{ fontSize:11, color:"#64748b", marginTop:1 }}>{feat.desc}</div>
                      <div style={{ fontSize:12, fontWeight:700, color: feat.cost < 0 ? "#16a34a" : "#dc2626", marginTop:2 }}>
                        {feat.cost < 0 ? "-" : "+"}{currency(Math.abs(feat.cost))}
                      </div>
                    </div>
                    <div style={{
                      width:22, height:22, borderRadius:"50%",
                      border:`2px solid ${on ? "#2563eb" : "#cbd5e1"}`,
                      background: on ? "#2563eb" : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
                    }}>
                      {on && <span style={{ color:"#fff", fontSize:12, fontWeight:700 }}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* 오른쪽 미리보기 */}
      <div style={{ width:260, flexShrink:0 }}>
        <div style={{ ...card, position:"sticky", top:72 }}>
          <h3 style={sectionTitle}>📱 상품 미리보기</h3>
          <div style={{ background:"linear-gradient(135deg,#1d4ed8 0%,#7c3aed 100%)", borderRadius:12, padding:16, color:"#fff", marginBottom:14 }}>
            <div style={{ fontSize:11, opacity:0.8, marginBottom:4 }}>5G 요금제</div>
            <div style={{ fontSize:16, fontWeight:700, marginBottom:8 }}>{product.name || "상품명을 입력하세요"}</div>
            <div style={{ fontSize:26, fontWeight:800 }}>
              {finalPrice > 0 ? currency(finalPrice) : "—"}
              <span style={{ fontSize:13, fontWeight:400, opacity:0.8 }}>/월</span>
            </div>
          </div>

          <div style={{ fontSize:12, color:"#64748b", marginBottom:8, fontWeight:600 }}>
            선택된 기능 ({selFeats.length}개)
          </div>
          {selFeats.length === 0
            ? <div style={{ color:"#94a3b8", fontSize:12, textAlign:"center", padding:"12px 0" }}>왼쪽에서 기능을 선택하세요</div>
            : <div style={{ display:"flex", flexDirection:"column", gap:4, marginBottom:12 }}>
                {selFeats.map(f => (
                  <div key={f.id} style={{ display:"flex", justifyContent:"space-between", fontSize:12 }}>
                    <span style={{ color:"#374151" }}>{f.icon} {f.name}</span>
                    <span style={{ color: f.cost < 0 ? "#16a34a" : "#6b7280", fontWeight:600 }}>
                      {f.cost < 0 ? "-" : "+"}{currency(Math.abs(f.cost))}
                    </span>
                  </div>
                ))}
              </div>
          }

          <div style={{ borderTop:"1px solid #e2e8f0", paddingTop:10, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
              <span style={{ color:"#64748b" }}>기본료</span>
              <span>{product.basePrice ? currency(product.basePrice) : "—"}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
              <span style={{ color:"#64748b" }}>기능 합산</span>
              <span style={{ color: featureTotal < 0 ? "#16a34a" : "#374151" }}>
                {featureTotal >= 0 ? "+" : ""}{currency(featureTotal)}
              </span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontWeight:700, fontSize:14, color:"#1e293b" }}>
              <span>최종 요금</span>
              <span style={{ color:"#2563eb" }}>{finalPrice > 0 ? currency(finalPrice) : "—"}</span>
            </div>
          </div>

          <button onClick={onNext} disabled={!canProceed} style={{
            ...btnPrimary, width:"100%", opacity: canProceed ? 1 : 0.4, cursor: canProceed ? "pointer" : "not-allowed",
          }}>
            검토 단계로 →
          </button>
          {!canProceed && <div style={{ fontSize:11, color:"#94a3b8", textAlign:"center", marginTop:6 }}>상품명·기본료·기능을 선택하세요</div>}
        </div>
      </div>
    </div>
  );
}

function ReviewStep({ product, selected, onSubmit, onBack }) {
  const allFeatures  = Object.values(FEATURE_CATALOG).flat();
  const selFeats     = allFeatures.filter(f => selected.has(f.id));
  const featureTotal = selFeats.reduce((s, f) => s + f.cost, 0);
  const finalPrice   = (product.basePrice || 0) + featureTotal;

  const [checklist, setChecklist] = useState({ legal:false, pricing:false, network:false, marketing:false });
  const checkLabels = {
    legal:     "법적 약관 및 고지사항 검토 완료",
    pricing:   "가격 정책 및 원가 분석 검토 완료",
    network:   "네트워크 용량 및 기술 검토 완료",
    marketing: "마케팅 자료 및 홍보 계획 검토 완료",
  };
  const allChecked = Object.values(checklist).every(Boolean);

  return (
    <div style={{ maxWidth:700, margin:"0 auto" }}>
      <div style={card}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <h3 style={{ ...sectionTitle, marginBottom:0 }}>🔍 상품 검토서</h3>
          <Badge status="review" />
        </div>

        <div style={{ background:"#f8fafc", borderRadius:10, padding:16, marginBottom:16 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <InfoRow label="상품명" value={product.name} />
            <InfoRow label="최종 요금" value={<span style={{ color:"#2563eb", fontWeight:700 }}>{currency(finalPrice)}/월</span>} />
            <InfoRow label="출시 대상" value={TARGET_LABEL[product.target]} />
            <InfoRow label="계약 기간" value={CONTRACT_LABEL[product.contract]} />
          </div>
          {product.description && (
            <div><span style={{ fontSize:12, color:"#64748b" }}>설명: </span><span style={{ fontSize:12, color:"#374151" }}>{product.description}</span></div>
          )}
        </div>

        <h4 style={{ fontSize:13, fontWeight:700, color:"#374151", marginBottom:10 }}>구성 기능 ({selFeats.length}개)</h4>
        {Object.entries(FEATURE_CATALOG).map(([cat, features]) => {
          const catSel = features.filter(f => selected.has(f.id));
          if (!catSel.length) return null;
          return (
            <div key={cat} style={{ marginBottom:10 }}>
              <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:6 }}>{CATEGORY_LABEL[cat]}</div>
              {catSel.map(f => (
                <div key={f.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 8px", background:"#f0fdf4", borderRadius:6, marginBottom:4 }}>
                  <span>{f.icon}</span>
                  <span style={{ flex:1, fontSize:13 }}>{f.name}</span>
                  <span style={{ fontSize:12, color:"#64748b" }}>{f.desc}</span>
                  <span style={{ fontSize:12, fontWeight:700, color: f.cost < 0 ? "#16a34a" : "#dc2626" }}>
                    {f.cost < 0 ? "-" : "+"}{currency(Math.abs(f.cost))}
                  </span>
                </div>
              ))}
            </div>
          );
        })}

        <div style={{ background:"#f8fafc", borderRadius:10, padding:14, marginTop:8, marginBottom:16 }}>
          <h4 style={{ fontSize:13, fontWeight:700, marginBottom:8 }}>💰 가격 구조</h4>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}>

        {step === "configure" && (
          <ConfigureStep product={product} setProduct={setProduct} selected={selected} setSelected={setSelected} onNext={() => setStep("review")} />

          <ReviewStep product={product} selected={selected} onSubmit={() => setStep("approve")} onBack={() => setStep("configure")} />

          <ApproveStep

  );

function LifecycleSimulator() {
  const [state, setState]           = useState(LC_STATES.idle);
  const [plan, setPlan]             = useState(null);
  const [addons, setAddons]         = useState({});
  const [contract, setContract]     = useState("month");
  const [custName, setCustName]     = useState("");
  const [custPhone, setCustPhone]   = useState("");
  const [custId, setCustId]         = useState("");
  const [idChecked, setIdChecked]   = useState(false);
  const [creditOk, setCreditOk]     = useState(false);
  const [activStep, setActivStep]   = useState(0);
  const [msisdn, setMsisdn]         = useState("");
  const [simNo, setSimNo]           = useState("");
  const [activatedAt, setActivatedAt] = useState(null);
  const [changePlan, setChangePlan] = useState(false);
  const [newPlan, setNewPlan]       = useState(null);
  const timerRef = useRef(null);

  const selPlan     = LC_PLANS.find(p => p.id === plan);
  const contractOpt = LC_CONTRACT.find(c => c.id === contract);
  const addonList   = LC_ADDONS.filter(a => addons[a.id]);
  const basePrice   = selPlan ? Math.round(selPlan.price * (1 - (contractOpt?.discount || 0))) : 0;
  const addonPrice  = addonList.reduce((s, a) => s + a.price, 0);
  const totalPrice  = basePrice + addonPrice;

  useEffect(() => {
    if (state === LC_STATES.activating) {
      setActivStep(0);
      let step = 0;
      function nextStep() {
        step++;
        if (step < ACTIV_STEPS.length) {
          timerRef.current = setTimeout(() => { setActivStep(step); nextStep(); }, 900);
        } else {
          timerRef.current = setTimeout(() => {
            setMsisdn("010-" + Math.floor(1000 + Math.random() * 9000) + "-" + Math.floor(1000 + Math.random() * 9000));
            setSimNo("8982" + Math.floor(100000000000 + Math.random() * 900000000000));
            setActivatedAt(new Date().toLocaleString("ko-KR"));
            setState(LC_STATES.active);
          }, 700);
        }
      }
      timerRef.current = setTimeout(nextStep, 900);
    }
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [state]);

  useEffect(() => {
    if (state === LC_STATES.terminating) {
      timerRef.current = setTimeout(() => setState(LC_STATES.terminated), 2000);
    }
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [state]);

  function reset() {
    setState(LC_STATES.idle); setPlan(null); setAddons({}); setContract("month");
    setCustName(""); setCustPhone(""); setCustId(""); setIdChecked(false); setCreditOk(false);
    setActivStep(0); setMsisdn(""); setSimNo(""); setActivatedAt(null);
    setChangePlan(false); setNewPlan(null);
    if (timerRef.current) clearTimeout(timerRef.current);
  }

  const STATE_BADGE = {
    idle:        { label:"대기",          color:"#64748b", bg:"#f1f5f9" },
    ordering:    { label:"신청 중",       color:"#d97706", bg:"#fef3c7" },
    verifying:   { label:"본인인증",      color:"#7c3aed", bg:"#ede9fe" },
    activating:  { label:"개통 처리 중", color:"#2563eb", bg:"#dbeafe" },
    active:      { label:"정상 이용",    color:"#15803d", bg:"#dcfce7" },
    suspended:   { label:"일시정지",     color:"#b45309", bg:"#fef3c7" },
    terminating: { label:"해지 처리 중", color:"#dc2626", bg:"#fee2e2" },
    terminated:  { label:"해지 완료",    color:"#64748b", bg:"#f1f5f9" },
  };
  const sb = STATE_BADGE[state];

  const LC_CARD = { background:"#fff", borderRadius:14, padding:20, boxShadow:"0 1px 4px rgba(0,0,0,0.08)", border:"1px solid #f1f5f9" };

  function CustomerCard() {
    return (
      <div style={{ width:220, flexShrink:0 }}>
        <div style={{ ...LC_CARD, marginBottom:10 }}>
          <p style={{ ...sectionTitle, fontSize:13 }}>👤 고객 정보</p>
          <div style={{ fontSize:12, color:"#475569", lineHeight:1.9 }}>
            <div><span style={{ color:"#94a3b8" }}>이름</span>&nbsp;<strong>{custName}</strong></div>
            <div><span style={{ color:"#94a3b8" }}>전화번호</span>&nbsp;<strong>{msisdn}</strong></div>
            <div><span style={{ color:"#94a3b8" }}>SIM</span>&nbsp;<strong style={{ fontSize:10 }}>{simNo}</strong></div>
            <div><span style={{ color:"#94a3b8" }}>개통일</span>&nbsp;<strong style={{ fontSize:10 }}>{activatedAt}</strong></div>
          </div>
        </div>
        <div style={{ ...LC_CARD, marginBottom:10 }}>

                  <button key={b.title} onClick={b.onClick} style={{ ...b.style, display:"flex", flexDirection:"column", alignItems:"flex-start", gap:4, height:"auto", padding:14, textAlign:"left" }}>
                    <span style={{ fontSize:18 }}>{b.icon}</span>
                    <span style={{ fontSize:13, fontWeight:700 }}>{b.title}</span>
                    <span style={{ fontSize:11, opacity:.7 }}>{b.sub}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={LC_CARD}>
            <h3 style={{ ...sectionTitle, fontSize:13 }}>📊 이용 현황 (시뮬레이션)</h3>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {[["데이터 사용", selPlan?.data==="무제한"?"무제한":Math.floor(Math.random()*50+10)+"GB"], ["음성통화","120분"], ["남은 데이터",selPlan?.data==="무제한"?"무제한":"잔여 일부"], ["청구 예정",totalPrice.toLocaleString()+"원"]].map(([k, v]) => (
                <div key={k} style={{ background:"#f8fafc", borderRadius:8, padding:"10px 12px" }}>
                  <div style={{ fontSize:11, color:"#94a3b8" }}>{k}</div>
                  <div style={{ fontWeight:700, fontSize:13, color:"#1e293b" }}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* 초기화 버튼 */}
          <div style={{ borderTop:"1px solid #e2e8f0", paddingTop:14, marginTop:4 }}>
            <button
              style={{ width:"100%", padding:"10px 16px", borderRadius:10, border:"1.5px solid #e2e8f0", background:"#fff", color:"#94a3b8", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6, transition:"all .15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor="#fca5a5"; e.currentTarget.style.color="#ef4444"; e.currentTarget.style.background="#fff5f5"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor="#e2e8f0"; e.currentTarget.style.color="#94a3b8"; e.currentTarget.style.background="#fff"; }}
              onClick={() => { if (window.confirm("모든 정보를 초기화하고 처음으로 돌아갈까요?")) reset(); }}
            >
              🔄 처음부터 다시 시작
            </button>
          </div>
        </div>
      </div>
    );
  }

  function SuspendedPanel() {
    return (
      <div style={{ display:"flex", gap:16, padding:"24px 0", animation:"fadeIn .25s ease" }}>
        {CustomerCard()}
        <div style={{ flex:1 }}>
          <div style={{ ...LC_CARD, textAlign:"center", padding:32 }}>
            <div style={{ fontSize:48, marginBottom:8 }}>⏸</div>
            <h3 style={sectionTitle}>서비스 일시정지</h3>
            <p style={{ fontSize:13, color:"#64748b", marginBottom:20 }}>현재 데이터/음성 이용이 중단된 상태입니다.</p>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button style={btnPrimary} onClick={() => setState(LC_STATES.active)}>▶ 서비스 재개</button>
              <button style={btnDanger} onClick={() => setState(LC_STATES.terminating)}>해지 처리</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function TerminatingPanel() {
    return (
      <div style={{ maxWidth:460, margin:"0 auto", padding:"24px 0", animation:"fadeIn .25s ease", textAlign:"center" }}>
        <div style={LC_CARD}>
          <div style={{ fontSize:40, marginBottom:12, animation:"pulse 1.5s infinite", display:"inline-block" }}>🔄</div>
          <h3 style={sectionTitle}>해지 처리 중...</h3>
          <p style={{ fontSize:13, color:"#64748b" }}>서비스를 안전하게 종료하고 있습니다.</p>
        </div>
      </div>
    );
  }

  function TerminatedPanel() {
    return (
      <div style={{ maxWidth:460, margin:"0 auto", padding:"24px 0", animation:"fadeIn .25s ease", textAlign:"center" }}>
        <div style={LC_CARD}>
          <div style={{ fontSize:64, marginBottom:12 }}>📴</div>
          <h3 style={sectionTitle}>해지 완료</h3>
          <p style={{ fontSize:13, color:"#64748b", marginBottom:24 }}>{custName}님의 서비스가 정상적으로 해지되었습니다.</p>
          <div style={{ background:"#f8fafc", borderRadius:10, padding:14, marginBottom:20, textAlign:"left" }}>
            <div style={{ fontSize:12, color:"#475569", lineHeight:2 }}>
              <div><span style={{ color:"#94a3b8" }}>고객명</span>: <strong>{custName}</strong></div>
              <div><span style={{ color:"#94a3b8" }}>전화번호</span>: <strong>{msisdn}</strong></div>
              <div><span style={{ color:"#94a3b8" }}>이용 요금제</span>: <strong>{selPlan?.name}</strong></div>
              <div><span style={{ color:"#94a3b8" }}>해지 일시</span>: <strong>{new Date().toLocaleString("ko-KR")}</strong></div>
            </div>
          </div>
          <button style={btnPrimary} onClick={reset}>새 가입 신청</button>
        </div>
      </div>
    );
  }

  const STATUS_FLOW = [
    { key:"idle",       label:"가입 신청" },
    { key:"ordering",   label:"정보 입력" },
    { key:"verifying",  label:"본인인증" },
    { key:"activating", label:"개통 처리" },
    { key:"active",     label:"이용 중"  },
  ];
  const activeIdx = STATUS_FLOW.findIndex(s => s.key === state);

  return (
    <div style={{ minHeight:"calc(100vh - 52px)", background:"#f1f5f9" }}>
      {!["terminating","terminated"].includes(state) && (
        <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", padding:"10px 24px" }}>
          <div style={{ maxWidth:900, margin:"0 auto", display:"flex", alignItems:"center" }}>
            {STATUS_FLOW.map((s, i) => {
              const done   = i < activeIdx;
              const active = s.key === state;
              const reach  = i <= activeIdx;
              return (
                <React.Fragment key={s.key}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ width:24, height:24, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, background:done?"#2563eb":active?"#eff6ff":"#f1f5f9", color:done?"#fff":active?"#2563eb":"#94a3b8", border:`2px solid ${reach?"#2563eb":"#e2e8f0"}` }}>
                      {done ? "✓" : i+1}
                    </div>
                    <span style={{ fontSize:12, fontWeight:600, color:active?"#2563eb":done?"#475569":"#94a3b8", whiteSpace:"nowrap" }}>{s.label}</span>
                  </div>
                  {i < STATUS_FLOW.length - 1 && <div style={{ flex:1, height:2, margin:"0 8px", background:done?"#2563eb":"#e2e8f0", minWidth:16 }} />}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ maxWidth:900, margin:"0 auto", padding:"0 16px" }}>
        {state === LC_STATES.idle        && IdlePanel()}
        {state === LC_STATES.ordering    && OrderingPanel()}
        {state === LC_STATES.verifying   && VerifyingPanel()}
        {state === LC_STATES.activating  && ActivatingPanel()}
        {state === LC_STATES.active      && ActivePanel()}
        {state === LC_STATES.suspended   && SuspendedPanel()}
        {state === LC_STATES.terminating && TerminatingPanel()}
        {state === LC_STATES.terminated  && TerminatedPanel()}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// Root App
// ══════════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState("launch");
  return (
    <div style={{ minHeight:"100vh", background:"#f1f5f9" }}>
      <TopNav page={page} setPage={setPage} />
      {page === "launch"    && <LaunchSimulator />}
      {page === "lifecycle" && <LifecycleSimulator />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
